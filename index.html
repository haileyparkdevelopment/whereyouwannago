<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>여행지 정하기</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff0f5;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .friend-card {
      background: white;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 10px;
    }

    button {
      padding: 8px 16px;
      background: #ff6b9d;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .result-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Where to Go</h1>

    <div class="friend-card">
      채니
      <button onclick="pickFriend(1)">Where?</button>
      <div id="r1">아직 미정</div>
    </div>

    <div class="friend-card">
      져니
      <button onclick="pickFriend(2)">Where?</button>
      <div id="r2">아직 미정</div>
    </div>

    <div class="friend-card">
      셔니
      <button onclick="pickFriend(3)">Where?</button>
      <div id="r3">아직 미정</div>
    </div>

    <div class="result-card">
      <h3>📍 중간 여행지</h3>
      <div id="middle">-</div>
    </div>

    <div class="result-card">
      <h3>🚆 영등포에서 가는법</h3>
      <div id="route">-</div>
    </div>

  </div>
  <script>

    let cities = [];

    const friendData = {
      1: null,
      2: null,
      3: null
    };

    async function loadCities() {
      const res = await fetch("cities.json");
      cities = await res.json();
    }

    loadCities();

    function mapLinks(city) {

      const google =
        `https://www.google.com/maps/search/?api=1&query=${city.lat},${city.lng}`;

      const kakao =
        `https://map.kakao.com/link/map/${city.name},${city.lat},${city.lng}`;

      return `
<div>
<a href="${google}" target="_blank">Google Map</a>
<a href="${kakao}" target="_blank">Kakao Map</a>
</div>
`;
    }

    function routeLinks(city) {

      const google =
        `https://www.google.com/maps/dir/37.5156,126.9070/${city.lat},${city.lng}`;

      const kakao =
        `https://map.kakao.com/link/from/영등포역,37.5156,126.9070/to/${city.name},${city.lat},${city.lng}`;

      return `
<div>
<a href="${google}" target="_blank">Google Route</a>
<a href="${kakao}" target="_blank">Kakao Route</a>
</div>
`;
    }

    function pickFriend(n) {

      const city =
        cities[Math.floor(Math.random() * cities.length)];

      friendData[n] = city;

      document.getElementById("r" + n).innerHTML =
        city.name + mapLinks(city);

      updateMiddle();

    }

    function updateMiddle() {

      if (!friendData[1] || !friendData[2] || !friendData[3]) return;

      const lat =
        (friendData[1].lat + friendData[2].lat + friendData[3].lat) / 3;

      const lng =
        (friendData[1].lng + friendData[2].lng + friendData[3].lng) / 3;

      let best = null;
      let minD = 999999;

      cities.forEach(c => {

        const d =
          Math.sqrt((lat - c.lat) ** 2 + (lng - c.lng) ** 2);

        if (d < minD) {
          minD = d;
          best = c;
        }

      });

      document.getElementById("middle").innerHTML =
        best.name + mapLinks(best);

      document.getElementById("route").innerHTML =
        routeLinks(best);

    }

  </script>
</body>
